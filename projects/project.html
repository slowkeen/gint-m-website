<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ГИНТ-М — Проект</title>
  <meta name="description" content="Проект ГИНТ-М." />
  <link rel="icon" href="../logo/Frame%20109.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../styles.css?v=20260424-footer-2" />
  <link rel="stylesheet" href="./projects.css?v=20260426-projects-motion-3" />
  <link rel="stylesheet" href="./project.css?v=20260426-project-motion-29" />
</head>
<body class="page-font-sf-pro projects-page project-case-page">
  <div data-site-partial="../partials/header.ru.html"></div>

  <main class="content-surface projects-surface project-case-main">
    <section class="projects-block project-case-block" aria-labelledby="project-case-title">
      <div class="projects-shell project-case-shell project-case-hero-shell">
        <div class="project-case-topline">
          <nav class="projects-page-breadcrumbs" aria-label="Хлебные крошки">
            <a href="../">Главная</a>
            <span aria-hidden="true">/</span>
            <a href="./">Проекты</a>
            <span aria-hidden="true">/</span>
            <span id="project-case-breadcrumb-current" aria-current="page">Проект</span>
          </nav>
        </div>
        <div class="project-case-headline">
          <h1 class="projects-title project-case-title" id="project-case-title">Проект</h1>
          <p class="project-case-year" id="project-case-year">—</p>
          <div class="project-case-headline-copy" id="project-case-headline-copy" hidden>
            <p class="project-case-summary" id="project-case-summary" hidden>Краткое описание проекта.</p>
            <button class="testimonial-read-more project-case-intro-read-more" id="project-case-summary-read-more" type="button" hidden>Читать полностью</button>
          </div>
        </div>
        <div class="project-case-description-panel">
          <p class="project-case-description-lead" id="project-case-description-lead">Описание проекта.</p>

          <div class="project-case-description-layout" id="project-case-description-layout">
            <div class="project-case-description-grid">
            <article class="project-case-description-card" id="project-case-date-start-card">
              <span class="project-case-description-label" id="project-case-date-start-label">Начало</span>
              <strong class="project-case-description-value" id="project-case-date-start">—</strong>
            </article>

            <article class="project-case-description-card" id="project-case-date-end-card">
              <span class="project-case-description-label" id="project-case-date-end-label">Окончание</span>
              <strong class="project-case-description-value" id="project-case-date-end">—</strong>
            </article>

            <article class="project-case-description-card">
              <span class="project-case-description-label">Общая площадь</span>
              <strong class="project-case-description-value" id="project-case-area">—</strong>
            </article>

            <article class="project-case-description-card project-case-description-card-address">
              <span class="project-case-description-label">Адрес</span>
              <strong class="project-case-description-value" id="project-case-address">—</strong>
            </article>
            </div>

            <aside class="project-case-award" id="project-case-award" aria-label="Награда проекта" hidden>
              <div class="project-case-award-card">
                <div class="project-case-award-media">
                  <img
                    class="project-case-award-image"
                    id="project-case-award-image"
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="
                    alt=""
                    width="1024"
                    height="1536"
                    decoding="async"
                  />
                </div>
                <p class="project-case-award-title" id="project-case-award-title"></p>
              </div>
            </aside>
          </div>
        </div>
      </div>
    </section>

    <section class="project-case-section project-case-gallery-section" aria-label="Главная фотография проекта">
      <div class="projects-shell project-case-shell project-case-gallery-shell">
        <div class="project-case-gallery-stream project-case-gallery-stream-hero" id="project-case-gallery-hero" aria-label="Главная фотография проекта"></div>
      </div>
    </section>

    <section class="project-case-section project-case-gallery-section project-case-gallery-section-secondary" aria-label="Галерея проекта" id="project-case-gallery-grid-section" hidden>
      <div class="projects-shell project-case-shell project-case-gallery-layout">
        <div class="project-case-gallery-stream" id="project-case-gallery-stream" aria-label="Галерея проекта"></div>

        <aside class="project-case-gallery-review" id="project-case-gallery-review" hidden>
          <article class="project-case-client-story" id="project-case-client-card">
            <div class="project-case-client-story-head">
              <span class="project-case-client-quote-mark" aria-hidden="true">«</span>

              <div class="project-case-client-brand" id="project-case-client-brand" hidden>
                <img class="project-case-client-logo" id="project-client-logo" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="" width="220" height="72" decoding="async" />
              </div>
            </div>

            <div class="project-case-client-quote" id="project-client-quote"></div>

            <div class="project-case-client-footer">
              <div class="project-case-client-person">
                <p class="project-case-client-name" id="project-client-name" hidden>Заказчик</p>
                <p class="project-case-client-role" id="project-client-role" hidden></p>
              </div>

              <button class="testimonial-read-more project-case-client-read-more" id="project-client-read-more" type="button" hidden>Читать отзыв полностью</button>
            </div>
          </article>
        </aside>
      </div>
    </section>

    <section class="project-case-next-section" aria-labelledby="project-next-title">
      <div class="projects-shell project-case-shell project-case-next-shell">
        <div class="project-case-next-head">
          <div class="project-case-section-head">
            <p class="projects-eyebrow">Проекты</p>
            <h2 class="project-case-section-title" id="project-next-title">Следующие проекты</h2>
          </div>

          <div class="project-case-next-actions">
            <a class="project-case-back-link" href="./">Все проекты</a>

            <div class="project-case-next-nav" aria-label="Навигация по следующим проектам">
              <button class="project-case-nav-button" id="project-case-next-prev" type="button" aria-label="Прокрутить к предыдущим проектам">&#8592;</button>
              <button class="project-case-nav-button" id="project-case-next-next" type="button" aria-label="Прокрутить к следующим проектам">&#8594;</button>
            </div>
          </div>
        </div>

        <div class="project-case-next-carousel" id="project-case-next-carousel">
          <div class="project-case-next-track" id="project-case-next-track" aria-label="Следующие проекты"></div>
        </div>
      </div>
    </section>
  </main>


  <div class="contact-modal project-gallery-modal" id="project-gallery-modal" hidden>
    <div class="contact-modal-backdrop" id="project-gallery-backdrop"></div>
    <div class="contact-modal-dialog project-gallery-modal-dialog" role="dialog" aria-modal="true" aria-label="Просмотр фотографий проекта">
      <div class="project-gallery-lightbox">
        <button class="contact-modal-close project-gallery-close" id="project-gallery-close" type="button" aria-label="Закрыть просмотр фотографий">&times;</button>

        <div class="project-gallery-lightbox-stage">
          <button class="company-logos-nav-button project-gallery-lightbox-nav project-gallery-lightbox-nav-prev" id="project-gallery-lightbox-prev" type="button" data-company-logos-nav="prev" aria-label="Предыдущее фото">
            <span class="company-logos-nav-icon" aria-hidden="true"></span>
          </button>
          <figure class="project-gallery-lightbox-media">
            <img class="project-gallery-lightbox-image" id="project-gallery-lightbox-image" src="../photos/kit-med/kitmed_1.jpg" alt="" width="4095" height="2735" decoding="async" />
          </figure>
          <button class="company-logos-nav-button project-gallery-lightbox-nav project-gallery-lightbox-nav-next" id="project-gallery-lightbox-next" type="button" data-company-logos-nav="next" aria-label="Следующее фото">
            <span class="company-logos-nav-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="contact-modal testimonial-modal" id="project-client-review-modal" hidden>
    <div class="contact-modal-backdrop" id="project-client-review-backdrop"></div>
    <div class="contact-modal-dialog testimonial-modal-dialog" role="dialog" aria-modal="true" aria-label="Полный отзыв клиента">
      <button class="contact-modal-close" id="project-client-review-close" type="button" aria-label="Закрыть отзыв">&times;</button>
      <article class="testimonial-letter">
        <div class="testimonial-letter-layout">
          <aside class="testimonial-letter-preview" id="project-client-review-preview" aria-label="Скан рекомендательного письма клиента">
            <img class="testimonial-letter-preview-image" id="project-client-review-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="" width="1241" height="1755" loading="lazy" decoding="async" />
          </aside>
          <div class="testimonial-letter-body">
            <p class="testimonial-letter-address" id="project-client-review-address"></p>
            <div class="project-case-client-review-copy" id="project-client-review-copy"></div>
          </div>
        </div>
      </article>
    </div>
  </div>

  <div class="contact-modal project-case-details-modal" id="project-case-details-modal" hidden>
    <div class="contact-modal-backdrop" id="project-case-details-backdrop"></div>
    <div class="contact-modal-dialog project-case-details-dialog" role="dialog" aria-modal="true" aria-labelledby="project-case-details-title">
      <button class="contact-modal-close" id="project-case-details-close" type="button" aria-label="Закрыть описание проекта">&times;</button>
      <article class="project-case-details-card">
        <header class="project-case-details-head">
          <h2 class="project-case-details-title" id="project-case-details-title">Проект</h2>
          <p class="project-case-details-lead" id="project-case-details-lead" hidden></p>
        </header>

        <div class="project-case-details-copy project-case-copy" id="project-case-details-copy" hidden></div>

        <section class="project-case-details-section" id="project-case-details-role-section" hidden aria-labelledby="project-case-details-role-title">
          <p class="project-case-details-section-title" id="project-case-details-role-title">Роль Gint-M</p>
          <div class="project-case-details-role-copy project-case-copy" id="project-case-details-role-copy"></div>
        </section>
      </article>
    </div>
  </div>
  <div data-site-partial="../partials/footer.ru.html"></div>
  <script src="../scripts/shared-partials.js?v=20260416-partials-6"></script>
  <script src="./projects.js?v=20260426-projects-motion-3"></script>
  <script src="./project.js?v=20260426-project-motion-13"></script>
</body>
</html>
